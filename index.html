<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>洲本市 空き家活用特区マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
    margin:0;
    height:100%;
    font-family:-apple-system,BlinkMacSystemFont,"Yu Gothic","Meiryo",sans-serif;
}

#map{
    width:100%;
    height:100vh;
}

.info{
    position:absolute;
    top:15px;
    left:15px;
    z-index:1000;

    background:white;
    padding:15px 18px;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,.15);
}

.info h2{
    margin:0;
    font-size:20px;
}

.info p{
    margin:6px 0 0;
    color:#666;
    font-size:14px;
}

.leaflet-popup-content{
    line-height:1.8;
    font-size:15px;
}

.leaflet-tooltip{
    background:white;
    border:none;
    border-radius:8px;
    box-shadow:0 3px 12px rgba(0,0,0,.2);
    padding:8px 12px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="info">
<h2>🏠 空き家活用特区</h2>
<p>兵庫県洲本市</p>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map=L.map("map");

L.tileLayer(
"https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
{
    attribution:"©OpenStreetMap ©CartoDB",
    maxZoom:20
}).addTo(map);

// GeoJSONを読み込む
fetch("tokku.geojson")
.then(res=>res.json())
.then(data=>{

    const geo=L.geoJSON(data,{

        style:function(feature){

            return{

                color:"#d35400",
                weight:2,

                fillColor:"#ff9800",
                fillOpacity:0.35

            }

        },

        onEachFeature:function(feature,layer){

            layer.bindTooltip(
                "空き家活用特区",
                {
                    sticky:true,
                    direction:"top"
                }
            );

            layer.bindPopup(`
<h2>🏠 空き家活用特区</h2>

<p>
兵庫県指定の空き家活用特区です。
</p>

<b>対象地区</b>

<ul>
<li>栄町</li>
<li>本町</li>
<li>山手</li>
<li>海岸通</li>
</ul>

<p>
空き家の活用や改修・解体などについて
各種支援制度があります。
</p>

`);

            layer.on({

                mouseover:function(e){

                    e.target.setStyle({

                        fillOpacity:0.65,
                        weight:3

                    });

                },

                mouseout:function(e){

                    geo.resetStyle(e.target);

                }

            });

        }

    }).addTo(map);

    map.fitBounds(geo.getBounds());

});

</script>

</body>
</html>
